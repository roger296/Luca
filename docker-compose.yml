version: '3.8'

services:
  # PostgreSQL database (the GL mirror database)
  db:
    image: postgres:16-alpine
    container_name: gl-mvp-db
    environment:
      POSTGRES_DB: gl_ledger
      POSTGRES_USER: gl_admin
      POSTGRES_PASSWORD: gl_dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl_admin -d gl_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  # GL module backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gl-mvp-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://gl_admin:gl_dev_password_change_me@db:5432/gl_ledger
      CHAIN_FILE_PATH: /data/chains
      JWT_SECRET: dev_jwt_secret_change_me
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - chain_data:/data/chains
    depends_on:
      db:
        condition: service_healthy

  # Test database (separate instance for integration tests)
  db-test:
    image: postgres:16-alpine
    container_name: gl-mvp-db-test
    environment:
      POSTGRES_DB: gl_ledger_test
      POSTGRES_USER: gl_admin
      POSTGRES_PASSWORD: gl_test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl_admin -d gl_ledger_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  chain_data:
