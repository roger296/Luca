version: '3.8'

services:
  # PostgreSQL database (GL mirror database)
  db:
    image: postgres:16-alpine
    container_name: gl-v1-db
    environment:
      POSTGRES_DB: gl_ledger
      POSTGRES_USER: gl_admin
      POSTGRES_PASSWORD: gl_dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl_admin -d gl_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  # GL module API + React frontend (built image)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gl-v1-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gl_admin:gl_dev_password_change_me@db:5432/gl_ledger
      CHAINS_DIR: /data/chains
      JWT_SECRET: dev_jwt_secret_change_me
      MCP_TENANT_ID: default
      MCP_USER_ID: dev@localhost
    ports:
      - "3000:3000"
    volumes:
      - ./data/chains:/data/chains   # bind mount so the MCP server (running on Windows) can share the same chain files
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Test database (separate instance for integration tests)
  db-test:
    image: postgres:16-alpine
    container_name: gl-v1-db-test
    environment:
      POSTGRES_DB: gl_ledger_test
      POSTGRES_USER: gl_admin
      POSTGRES_PASSWORD: gl_test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl_admin -d gl_ledger_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  # chain_data volume removed — chains now use a bind mount (./data/chains) so the
  # MCP server process running on Windows can read and write the same chain files
  # as the Docker API container. The folder is created automatically on first run.
