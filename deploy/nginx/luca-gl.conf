# /etc/nginx/sites-available/luca-gl
#
# Nginx configuration for Luca's General Ledger on a VPS.
#
# Two server blocks:
#   gl.yourdomain.com   — GL web app + REST API  (proxies to port 3000)
#   mcp.yourdomain.com  — MCP + OAuth server     (proxies to port 3002)
#
# Replace EVERY occurrence of yourdomain.com with your actual domain before use.
# Certbot will update the ssl_certificate paths automatically when you run it.
#
# Installation:
#   sudo cp luca-gl.conf /etc/nginx/sites-available/luca-gl
#   sudo ln -s /etc/nginx/sites-available/luca-gl /etc/nginx/sites-enabled/luca-gl
#   sudo nginx -t && sudo systemctl reload nginx

# ── GL web app ────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name gl.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gl.yourdomain.com;

    # Certbot will fill these in (certbot --nginx -d gl.yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/gl.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gl.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  120s;
    }
}

# ── MCP + OAuth server ────────────────────────────────────────────────────────
#
# The MCP server handles these paths:
#   /mcp                                     — MCP Streamable HTTP endpoint
#   /authorize                               — OAuth authorization page
#   /token                                   — OAuth token exchange
#   /register                                — Dynamic client registration
#   /.well-known/oauth-protected-resource    — Resource metadata (RFC 9728)
#   /.well-known/oauth-authorization-server  — Auth server metadata (RFC 8414)
#   /health                                  — Health check

server {
    listen 80;
    server_name mcp.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.yourdomain.com;

    # Certbot will fill these in (certbot --nginx -d mcp.yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/mcp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass          http://127.0.0.1:3002;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        # MCP uses long-lived streaming connections — disable buffering and
        # set generous timeouts so the connection isn't dropped mid-stream.
        proxy_buffering     off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }
}
